<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <circle cx="60" cy="60" r="60" fill="#f9c6d0"/>
  <!-- pulled back hair sides -->
  <path d="M33 65 Q31 72 32 80" stroke="black" stroke-width="5" stroke-linecap="round"/>
  <path d="M87 65 Q89 72 88 80" stroke="black" stroke-width="5" stroke-linecap="round"/>
  <!-- bun on top -->
  <circle cx="60" cy="40" r="14" fill="black"/>
  <!-- bun wrap lines -->
  <path d="M50 40 Q60 34 70 40" stroke="#333" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M48 44 Q60 37 72 44" stroke="#333" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- hair pulled back from face -->
  <path d="M34 60 Q34 44 60 42 Q86 44 86 60 L84 52 Q80 44 60 42 Q40 44 36 52Z" fill="black"/>
  <!-- face -->
  <ellipse cx="60" cy="72" rx="27" ry="28" fill="white" stroke="black" stroke-width="2.5"/>
  <!-- ears + small earrings -->
  <ellipse cx="33" cy="70" rx="4.5" ry="5.5" fill="white" stroke="black" stroke-width="2"/>
  <ellipse cx="87" cy="70" rx="4.5" ry="5.5" fill="white" stroke="black" stroke-width="2"/>
  <circle cx="33" cy="74" r="2.5" fill="black"/>
  <circle cx="87" cy="74" r="2.5" fill="black"/>
  <!-- eyebrows: neat, precise -->
  <path d="M44 60 L57 58" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M63 58 L76 60" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <!-- eyes: precise, careful -->
  <ellipse cx="50" cy="67" rx="6" ry="5" fill="white" stroke="black" stroke-width="2"/>
  <circle cx="51" cy="68" r="2.8" fill="black"/>
  <circle cx="52" cy="67" r="0.9" fill="white"/>
  <ellipse cx="70" cy="67" rx="6" ry="5" fill="white" stroke="black" stroke-width="2"/>
  <circle cx="71" cy="68" r="2.8" fill="black"/>
  <circle cx="72" cy="67" r="0.9" fill="white"/>
  <!-- nose -->
  <path d="M57 76 Q60 80 63 76" stroke="black" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- mouth: neat, composed -->
  <path d="M53 84 Q60 88 67 84" stroke="black" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
