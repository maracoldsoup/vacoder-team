<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <circle cx="60" cy="60" r="60" fill="#b6e3f4"/>
  <!-- face -->
  <ellipse cx="60" cy="72" rx="28" ry="30" fill="white" stroke="black" stroke-width="2.5"/>
  <!-- hair: short, side-parted professional -->
  <path d="M32 66 Q32 42 60 40 Q88 42 88 66 L86 58 Q80 40 60 38 Q40 40 34 58Z" fill="black"/>
  <!-- part detail -->
  <path d="M62 40 L60 52" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- ears -->
  <ellipse cx="32" cy="72" rx="5" ry="6" fill="white" stroke="black" stroke-width="2"/>
  <ellipse cx="88" cy="72" rx="5" ry="6" fill="white" stroke="black" stroke-width="2"/>
  <!-- eyebrows: straight confident -->
  <path d="M44 62 L56 60" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M64 60 L76 62" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <!-- eyes -->
  <ellipse cx="50" cy="69" rx="6" ry="5" fill="white" stroke="black" stroke-width="2"/>
  <circle cx="51" cy="70" r="2.5" fill="black"/>
  <ellipse cx="70" cy="69" rx="6" ry="5" fill="white" stroke="black" stroke-width="2"/>
  <circle cx="71" cy="70" r="2.5" fill="black"/>
  <!-- nose -->
  <path d="M57 78 Q60 82 63 78" stroke="black" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- smile: confident -->
  <path d="M50 87 Q60 95 70 87" stroke="black" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
