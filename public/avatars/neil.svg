<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <circle cx="60" cy="60" r="60" fill="#e8d5f5"/>
  <!-- face: slightly tinted for darker skin representation -->
  <ellipse cx="60" cy="72" rx="28" ry="30" fill="#e8c9a0" stroke="black" stroke-width="2.5"/>
  <!-- hair: afro/natural curls - wide rounded top -->
  <ellipse cx="60" cy="50" rx="34" ry="24" fill="black"/>
  <!-- curly texture on afro -->
  <circle cx="42" cy="46" r="5" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="52" cy="40" r="5" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="62" cy="38" r="5" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="72" cy="40" r="5" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="80" cy="46" r="5" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="47" cy="54" r="4" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="73" cy="54" r="4" fill="none" stroke="#333" stroke-width="2"/>
  <!-- ears -->
  <ellipse cx="32" cy="72" rx="5" ry="6" fill="#e8c9a0" stroke="black" stroke-width="2"/>
  <ellipse cx="88" cy="72" rx="5" ry="6" fill="#e8c9a0" stroke="black" stroke-width="2"/>
  <!-- eyebrows -->
  <path d="M42 62 Q50 58 57 61" stroke="black" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M63 61 Q70 58 78 62" stroke="black" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- eyes: thoughtful, deep -->
  <ellipse cx="50" cy="69" rx="6" ry="5.5" fill="white" stroke="black" stroke-width="2"/>
  <circle cx="51" cy="70" r="3" fill="black"/>
  <circle cx="52" cy="69" r="1" fill="white"/>
  <ellipse cx="70" cy="69" rx="6" ry="5.5" fill="white" stroke="black" stroke-width="2"/>
  <circle cx="71" cy="70" r="3" fill="black"/>
  <circle cx="72" cy="69" r="1" fill="white"/>
  <!-- nose: broader -->
  <path d="M55 79 Q60 84 65 79" stroke="black" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="56" cy="79" r="1.5" fill="black" opacity="0.4"/>
  <circle cx="64" cy="79" r="1.5" fill="black" opacity="0.4"/>
  <!-- mouth: pensive smile -->
  <path d="M50 87 Q60 93 70 87" stroke="black" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
