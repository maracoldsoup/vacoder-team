<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <circle cx="60" cy="60" r="60" fill="#ffe5a0"/>
  <!-- wavy hair back -->
  <ellipse cx="60" cy="82" rx="34" ry="24" fill="#3D2010"/>
  <rect x="26" y="64" width="13" height="42" rx="6" fill="#3D2010"/>
  <rect x="81" y="64" width="13" height="42" rx="6" fill="#3D2010"/>
  <!-- face -->
  <ellipse cx="60" cy="70" rx="27" ry="29" fill="white" stroke="black" stroke-width="2.5"/>
  <!-- wavy hair front: warm brown, flowing -->
  <path d="M33 62 Q33 38 60 36 Q87 38 87 62 L85 54 Q80 36 60 34 Q40 36 35 54Z" fill="#3D2010"/>
  <!-- wavy texture -->
  <path d="M36 50 Q42 44 48 50 Q54 56 60 48" stroke="#5C3010" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M60 48 Q66 56 72 50 Q78 44 84 50" stroke="#5C3010" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- hair framing sides -->
  <path d="M34 60 Q31 68 32 78" stroke="#3D2010" stroke-width="9" stroke-linecap="round"/>
  <path d="M86 60 Q89 68 88 78" stroke="#3D2010" stroke-width="9" stroke-linecap="round"/>
  <!-- ears -->
  <ellipse cx="33" cy="70" rx="4" ry="5" fill="white" stroke="black" stroke-width="2"/>
  <ellipse cx="87" cy="70" rx="4" ry="5" fill="white" stroke="black" stroke-width="2"/>
  <!-- eyebrows: raised, bright -->
  <path d="M43 59 Q51 55 57 58" stroke="black" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M63 58 Q69 55 77 59" stroke="black" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- eyes: sparkly, wide -->
  <ellipse cx="50" cy="66" rx="6.5" ry="6" fill="white" stroke="black" stroke-width="2"/>
  <circle cx="51" cy="67" r="3.5" fill="black"/>
  <circle cx="52.5" cy="65.5" r="1.2" fill="white"/>
  <ellipse cx="70" cy="66" rx="6.5" ry="6" fill="white" stroke="black" stroke-width="2"/>
  <circle cx="71" cy="67" r="3.5" fill="black"/>
  <circle cx="72.5" cy="65.5" r="1.2" fill="white"/>
  <!-- nose -->
  <path d="M57 75 Q60 79 63 75" stroke="black" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- big cheerful smile -->
  <path d="M47 82 Q60 95 73 82" stroke="black" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
