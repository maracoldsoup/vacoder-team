<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <circle cx="60" cy="60" r="60" fill="#c7e8f3"/>
  <!-- face -->
  <ellipse cx="60" cy="72" rx="28" ry="30" fill="white" stroke="black" stroke-width="2.5"/>
  <!-- hair: neat center-parted -->
  <path d="M32 64 Q32 42 60 40 Q88 42 88 64 L86 56 Q80 40 60 38 Q40 40 34 56Z" fill="black"/>
  <!-- center part -->
  <path d="M60 40 L60 54" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- ears -->
  <ellipse cx="32" cy="72" rx="5" ry="6" fill="white" stroke="black" stroke-width="2"/>
  <ellipse cx="88" cy="72" rx="5" ry="6" fill="white" stroke="black" stroke-width="2"/>
  <!-- eyebrows (above glasses) -->
  <path d="M42 59 Q50 56 57 59" stroke="black" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M63 59 Q70 56 78 59" stroke="black" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- glasses -->
  <rect x="39" y="62" width="18" height="13" rx="5" fill="white" stroke="black" stroke-width="2.5"/>
  <rect x="63" y="62" width="18" height="13" rx="5" fill="white" stroke="black" stroke-width="2.5"/>
  <line x1="57" y1="68.5" x2="63" y2="68.5" stroke="black" stroke-width="2.5"/>
  <line x1="39" y1="68" x2="34" y2="67" stroke="black" stroke-width="2.5"/>
  <line x1="81" y1="68" x2="86" y2="67" stroke="black" stroke-width="2.5"/>
  <!-- eyes behind glasses -->
  <circle cx="48" cy="68.5" r="3" fill="black"/>
  <circle cx="72" cy="68.5" r="3" fill="black"/>
  <!-- nose -->
  <path d="M57 78 Q60 82 63 78" stroke="black" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- mouth: neutral analytical -->
  <path d="M52 87 Q60 90 68 87" stroke="black" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
